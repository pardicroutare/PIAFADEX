apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: piafadex-backend
  namespace: piafadex
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: piafadex.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: piafadex-backend
                port:
                  number: 80
