apiVersion: apps/v1
kind: Deployment
metadata:
  name: piafadex-backend
  namespace: piafadex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: piafadex-backend
  template:
    metadata:
      labels:
        app: piafadex-backend
    spec:
      containers:
        - name: backend
          image: piafadex-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: piafadex-config
            - secretRef:
                name: piafadex-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: temp-storage
              mountPath: /tmp/piafadex
      volumes:
        - name: temp-storage
          emptyDir: {}
